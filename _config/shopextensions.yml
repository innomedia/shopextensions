---
Name: shopextensions
# Apply after silvershop's own extensions so SiteConfig sub-tabs land inside silvershop's
# Root.Shop.ShopTabs TabSet (built by ShopConfigExtension) instead of spawning a duplicate
# "Shop" tab. The real silvershop config doc is named `silvershop-extensions`; the previous
# `silvershop/config#shopconfig` reference did not exist and was silently ignored.
After: '#silvershop-extensions'
---
# Configure email sending behavior
ShopExtensions\CustomOrderEmailNotifier:
  # Set to false to send emails directly without queuing (for debugging)
  use_queued_jobs: true
  # Set to false to disable status change emails
  send_statuschanges: true
  # Per-mail-type control of the invoice PDF attachment.
  # These act on top of the SiteConfig.SendReceiptEmail master switch.
  attach_invoice_to_receipt: true
  attach_invoice_to_admin: true
  attach_invoice_to_confirmation: false

SilverStripe\ORM\FieldType\DBCurrency:
  currency_symbol: '€'

# Configure tax calculation
ShopExtensions\CustomTaxModifier:
  # Tax mode: 'inclusive' = tax included in prices (Enthaltene MwSt / inkl. MwSt)
  #           'exclusive' = tax added on top of prices (zzgl. MwSt)
  tax_mode: 'inclusive'  # Options: 'inclusive' or 'exclusive'
  
  # Per-product tax: when true, each product can have its own tax rate
  #                  when false, all products use the static default_tax_rate
  per_product_tax: false
  
  # Default/static tax rate (used when per_product_tax is false, or as fallback)
  default_tax_rate: 19

# Register Order extension
SilverShop\Model\Order:
  extensions:
    - ShopExtensions\OrderExtension

# Register Product extension for RequiresShipping logic and Tax field
SilverShop\Page\Product:
  extensions:
    - ShopExtensions\ProductExtension
  # Default: physical products require shipping
  requires_shipping: true

# Configure default tax rate for new products.
# IMPORTANT: available_tax_rates is a LIST of {rate, label} maps, NOT an associative
# array keyed by rate. SilverStripe's config merge treats an array whose keys are all
# integers (e.g. 0, 7, 19) as an indexed list and REINDEXES the keys to 0, 1, 2 — which
# would make the CMS dropdown store the option index instead of the actual tax rate.
# The list-of-maps format below avoids that; ProductExtension builds the dropdown from it.
ShopExtensions\ProductExtension:
  default_tax_rate: 19
  available_tax_rates:
    - { rate: 0, label: '0% (steuerfrei)' }
    - { rate: 7, label: '7% (ermäßigt)' }
    - { rate: 19, label: '19% (regulär)' }

# Example: Digital products/courses don't require shipping
# Configure specific product classes to not require shipping:
Course:
  requires_shipping: false
Webinar:
  requires_shipping: false

PremiumMembership:
  requires_shipping: false

SilverShop\Page\AccountPageController:
  extensions:
  - ShopExtensions\AccountPageControllerExtension
SilverShop\Page\CheckoutPageController:
  extensions:
  - ShopExtensions\CheckoutPageControllerExtension
  - SilverShop\Discounts\Extensions\CouponFormCheckoutDecorator
SilverShop\Cart\ShoppingCartController:
  extensions:
  - ShopExtensions\ShoppingCartControllerExtension
SilverShop\Model\Address:
  extensions:
  - ShopExtensions\AddressExtension
SilverStripe\Omnipay\Service\PurchaseService:
  extensions:
  - ShopExtensions\ExtendedPurchaseService
# Assign the invoice number when a Manual/invoice payment is authorized/captured. The
# Cart→Unpaid transition happens before the Payment exists, so this can't be done in
# Order::onStatusChange (see PaymentExtension for the full rationale).
SilverStripe\Omnipay\Model\Payment:
  extensions:
  - ShopExtensions\PaymentExtension
SilverShop\Model\OrderItem:
  extensions:
  - ShopExtensions\OrderItemExtension
SilverShop\Page\ProductController:
  extensions:
  - ShopExtensions\ProductControllerExtension
# Tailwind styling for the frontend add-to-cart form. VariationForm extends
# AddProductForm and calls the parent constructor, so this single registration
# styles both forms.
SilverShop\Forms\AddProductForm:
  extensions:
  - ShopExtensions\AddProductFormExtension
Silverstripe\SiteConfig\SiteConfig:
  extensions:
  - ShopExtensions\SiteConfigExtension

# Configure which SiteConfig fields to show in CMS
# Default: all fields shown. Uncomment to customize:
# ShopExtensions\SiteConfigExtension:
#   enabled_fields:
#     - AdminNotificationMail
#     - ReceiptLogo
#     - ReceiptHeader
#     - ReceiptFooter
#     - ReceiptPhone
#     - CostHint
#     - HintPayment
#     - HintAfterPayment
#     - InvoiceNumberPrefix
#     - InvoiceNumberStart

# NOTE: We deliberately do NOT override the SilverShop\Checkout\CheckoutComponentConfig
# service here. The checkout order form already builds CustomCheckoutComponentConfig
# explicitly in CheckoutPageControllerExtension::updateOrderForm(), so the override was
# redundant. Worse, it made EVERY base CheckoutComponentConfig::create() consumer (the
# discounts CouponForm, the multi-step checkout steps, ...) receive the full checkout
# component set instead of an empty base config — which flooded the coupon form with all
# checkout fields. Leaving the base service untouched keeps the coupon form slim.
SilverStripe\Core\Injector\Injector:
  # Use custom order email notifier with queued job support
  SilverShop\Checkout\OrderEmailNotifier:
    class: ShopExtensions\CustomOrderEmailNotifier
