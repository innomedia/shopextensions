---
Name: shopextensions
After: silvershop/config#shopconfig
---
ShopConfig:
  sendReceipt: true

# Configure email sending behavior
ShopExtensions\CustomOrderEmailNotifier:
  # Set to false to send emails directly without queuing (for debugging)
  use_queued_jobs: true
  # Set to false to disable status change emails
  send_statuschanges: true

SilverStripe\ORM\FieldType\DBCurrency:
  currency_symbol: '€'

# Register Order extension
SilverShop\Model\Order:
  extensions:
    - ShopExtensions\OrderExtension

# Register Product extension for RequiresShipping logic
SilverShop\Page\Product:
  extensions:
    - ShopExtensions\ProductExtension
  # Default: physical products require shipping
  requires_shipping: true

# Example: Digital products/courses don't require shipping
# Configure specific product classes to not require shipping:
Course:
  requires_shipping: false

SilverShop\Page\AccountPageController:
  extensions:
  - ShopExtensions\AccountPageControllerExtension
SilverShop\Page\CheckoutPageController:
  extensions:
  - ShopExtensions\CheckoutPageControllerExtension
  - SilverShop\Discounts\Extensions\CouponFormCheckoutDecorator
SilverShop\Cart\ShoppingCartController:
  extensions:
  - ShopExtensions\ShoppingCartControllerExtension
SilverShop\Model\Address:
  extensions:
  - ShopExtensions\AddressExtension
SilverStripe\Omnipay\Service\PurchaseService:
  extensions:
  - ShopExtensions\ExtendedPurchaseService
SilverShop\Model\OrderItem:
  extensions:
  - ShopExtensions\OrderItemExtension
SilverShop\Page\ProductController:
  extensions:
  - ShopExtensions\ProductControllerExtension
Silverstripe\SiteConfig\SiteConfig:
  extensions:
  - ShopExtensions\SiteConfigExtension
PageController:
  extensions:
    - ShopExtensions\PageControllerExtension

# Use custom checkout component config
SilverStripe\Core\Injector\Injector:
  SilverShop\Checkout\CheckoutComponentConfig:
    class: ShopExtensions\CustomCheckoutComponentConfig
  # Use custom order email notifier with queued job support
  SilverShop\Checkout\OrderEmailNotifier:
    class: ShopExtensions\CustomOrderEmailNotifier
